<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIOS USER TOOL · DLL ↔ Base64</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(145deg, #0b0e14 0%, #151b26 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .tool-container {
            width: 820px;
            max-width: 100%;
            background: #1e2636;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), inset 0 0 0 1px rgba(255, 255, 255, 0.04);
            padding: 28px 30px 32px;
            transition: all 0.2s;
        }
        /* header brand */
        .brand-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid rgba(255, 215, 100, 0.15);
            padding-bottom: 12px;
            margin-bottom: 22px;
            flex-wrap: wrap;
            gap: 8px 12px;
        }
        .brand-header h1 {
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #f5e7d3;
            background: linear-gradient(135deg, #f6d792, #e6b86b);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 12px rgba(230, 184, 107, 0.2);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .brand-header h1 small {
            font-size: 16px;
            font-weight: 400;
            -webkit-text-fill-color: #b9c2d4;
            background: none;
            color: #b9c2d4;
            letter-spacing: 0.3px;
            margin-left: 4px;
        }
        .brand-tag {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #b6c2d9;
            font-size: 15px;
            font-weight: 400;
            background: rgba(255, 215, 100, 0.05);
            padding: 6px 16px 6px 18px;
            border-radius: 40px;
            border: 1px solid rgba(255, 215, 100, 0.15);
            backdrop-filter: blur(2px);
        }
        .brand-tag strong {
            color: #f5d38e;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .brand-tag .dev {
            color: #9aa9c9;
            font-size: 13px;
            border-left: 1px solid #3d4a62;
            padding-left: 12px;
        }
        .brand-tag .dev span {
            color: #d6b17e;
        }

        /* mode selector */
        .mode-selector {
            background: #121a28;
            border-radius: 60px;
            display: inline-flex;
            padding: 4px;
            margin-bottom: 24px;
            border: 1px solid #2a354b;
        }
        .mode-option {
            background: transparent;
            border: none;
            padding: 10px 28px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 15px;
            color: #8d9bb8;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.3px;
        }
        .mode-option.active {
            background: #f5d38e;
            color: #141c2a;
            box-shadow: 0 4px 12px rgba(245, 211, 142, 0.25);
        }
        .mode-option:first-child.active {
            background: #f5d38e;
        }
        .mode-option:last-child.active {
            background: #f5d38e;
        }

        /* file area */
        .file-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
            background: #131b2a;
            padding: 20px 22px;
            border-radius: 28px;
            border: 1px solid #2b364e;
            margin-bottom: 22px;
        }
        .file-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .file-row label {
            min-width: 80px;
            color: #b6c6e5;
            font-weight: 500;
            font-size: 14px;
            letter-spacing: 0.2px;
        }
        .file-row input {
            flex: 1;
            background: #0f1624;
            border: 1px solid #2d3a54;
            border-radius: 40px;
            padding: 10px 18px;
            color: #e8edf5;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
            min-width: 160px;
        }
        .file-row input:focus {
            border-color: #f5d38e;
            box-shadow: 0 0 0 2px rgba(245, 211, 142, 0.2);
        }
        .btn {
            background: #2a3752;
            border: none;
            border-radius: 40px;
            padding: 9px 18px;
            font-weight: 600;
            font-size: 13px;
            color: #d3def5;
            cursor: pointer;
            transition: 0.15s;
            white-space: nowrap;
            border: 1px solid #3a4a68;
            letter-spacing: 0.3px;
        }
        .btn:hover {
            background: #3a4b6e;
            color: white;
            border-color: #f5d38e;
            box-shadow: 0 0 12px rgba(245, 211, 142, 0.08);
        }
        .btn-primary {
            background: #f5d38e;
            color: #141c2a;
            border: 1px solid #eac481;
            font-weight: 700;
            padding: 12px 32px;
            font-size: 15px;
            box-shadow: 0 4px 14px rgba(245, 211, 142, 0.15);
        }
        .btn-primary:hover {
            background: #fadca0;
            border-color: #f5d38e;
            box-shadow: 0 6px 20px rgba(245, 211, 142, 0.25);
            color: #0b111e;
        }
        .btn-primary:disabled {
            opacity: 0.5;
            pointer-events: none;
            filter: grayscale(0.4);
        }

        .action-bar {
            display: flex;
            gap: 14px;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 6px;
        }

        /* progress & status */
        .progress-wrap {
            background: #0f1624;
            height: 6px;
            border-radius: 20px;
            margin: 18px 0 12px;
            overflow: hidden;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #f5d38e, #eab868);
            border-radius: 20px;
            transition: width 0.2s;
        }
        .status-line {
            display: flex;
            justify-content: space-between;
            color: #9aabcf;
            font-size: 14px;
            padding: 0 4px;
            margin-bottom: 14px;
        }
        .status-line .stat {
            color: #cfdefa;
        }

        /* result panel */
        .result-panel {
            background: #0e1625;
            border-radius: 28px;
            padding: 18px 20px 20px;
            border: 1px solid #29344e;
            margin: 8px 0 14px;
        }
        .result-panel textarea {
            width: 100%;
            height: 140px;
            background: #0b111e;
            border: 1px solid #29344e;
            border-radius: 20px;
            padding: 16px;
            color: #dce5f5;
            font-size: 13px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            resize: vertical;
            outline: none;
            transition: 0.15s;
            line-height: 1.5;
        }
        .result-panel textarea:focus {
            border-color: #f5d38e;
        }
        .result-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .result-actions .btn {
            background: #1f2a40;
            border-color: #354564;
        }
        .result-actions .btn:hover {
            background: #2f3d5e;
        }

        .footer-note {
            margin-top: 18px;
            font-size: 12px;
            color: #5f6f91;
            text-align: right;
            border-top: 1px solid #1f2a40;
            padding-top: 14px;
            letter-spacing: 0.2px;
        }
        .footer-note span {
            color: #b6a07c;
        }

        /* responsive */
        @media (max-width: 580px) {
            .brand-header { flex-direction: column; align-items: start; }
            .brand-tag { flex-wrap: wrap; }
            .file-row { flex-direction: column; align-items: stretch; }
            .file-row label { min-width: auto; }
            .mode-selector { width: 100%; justify-content: center; }
            .mode-option { flex: 1; text-align: center; padding: 10px 0; }
        }
    </style>
</head>
<body>
<div class="tool-container" id="app">
    <!-- brand header -->
    <div class="brand-header">
        <h1>
            BIOS USER TOOL
            <small>DLL ↔ Base64</small>
        </h1>
        <div class="brand-tag">
            <strong>HYPERSENSEINDIA</strong>
            <span class="dev">DEV: <span>AG HYDRAX FF</span></span>
        </div>
    </div>

    <!-- mode -->
    <div class="mode-selector" role="group">
        <button class="mode-option active" data-mode="dll_to_base64">📄 DLL → Base64</button>
        <button class="mode-option" data-mode="base64_to_dll">🔣 Base64 → DLL</button>
    </div>

    <!-- file selection -->
    <div class="file-grid">
        <div class="file-row">
            <label>📂 Input</label>
            <input type="text" id="inputPath" placeholder="Select input file..." readonly>
            <button class="btn" id="browseInputBtn">Browse</button>
        </div>
        <div class="file-row">
            <label>💾 Output</label>
            <input type="text" id="outputPath" placeholder="Auto‑generated or browse..." readonly>
            <button class="btn" id="browseOutputBtn">Browse</button>
            <button class="btn" id="autoNameBtn">Auto name</button>
        </div>
        <div class="action-bar">
            <button class="btn btn-primary" id="convertBtn">⚡ Convert</button>
        </div>
    </div>

    <!-- progress & status -->
    <div class="progress-wrap">
        <div class="progress-bar" id="progressBar" style="width:0%"></div>
    </div>
    <div class="status-line">
        <span id="statusText">Ready</span>
        <span class="stat" id="fileSizeStat"></span>
    </div>

    <!-- result panel -->
    <div class="result-panel">
        <textarea id="resultArea" placeholder="Result preview will appear here ..." readonly></textarea>
        <div class="result-actions">
            <button class="btn" id="copyBtn">📋 Copy</button>
            <button class="btn" id="clearBtn">🧹 Clear</button>
            <button class="btn" id="saveOutputBtn">💾 Save output</button>
        </div>
    </div>

    <div class="footer-note">
        <span>BIOS USER TOOL</span> · HYPERSENSEINDIA · AG HYDRAX FF
    </div>
</div>
<script>
    (function(){
        "use strict";

        // DOM refs
        const inputPath = document.getElementById('inputPath');
        const outputPath = document.getElementById('outputPath');
        const browseInputBtn = document.getElementById('browseInputBtn');
        const browseOutputBtn = document.getElementById('browseOutputBtn');
        const autoNameBtn = document.getElementById('autoNameBtn');
        const convertBtn = document.getElementById('convertBtn');
        const progressBar = document.getElementById('progressBar');
        const statusText = document.getElementById('statusText');
        const fileSizeStat = document.getElementById('fileSizeStat');
        const resultArea = document.getElementById('resultArea');
        const copyBtn = document.getElementById('copyBtn');
        const clearBtn = document.getElementById('clearBtn');
        const saveOutputBtn = document.getElementById('saveOutputBtn');
        const modeOptions = document.querySelectorAll('.mode-option');

        // state
        let currentMode = 'dll_to_base64';    // 'dll_to_base64' or 'base64_to_dll'
        let lastResult = '';
        let lastOutputPath = '';

        // ----- helper functions -----
        function setStatus(msg, isError = false) {
            statusText.textContent = msg;
            statusText.style.color = isError ? '#f7a58f' : '#b6c6e5';
        }

        function setProgress(pct) {
            progressBar.style.width = Math.min(100, Math.max(0, pct)) + '%';
        }

        function updateFileSizeStat(path) {
            if (!path) { fileSizeStat.textContent = ''; return; }
            try {
                const stats = fs.statSync(path);
                const size = stats.size;
                if (size < 1024) fileSizeStat.textContent = size + ' B';
                else if (size < 1048576) fileSizeStat.textContent = (size/1024).toFixed(1) + ' KB';
                else fileSizeStat.textContent = (size/1048576).toFixed(2) + ' MB';
            } catch (_) {
                fileSizeStat.textContent = '';
            }
        }

        // base64 encode/decode (browser)
        function dllToBase64(fileData) {
            const binary = new Uint8Array(fileData);
            let binaryStr = '';
            for (let i = 0; i < binary.length; i++) {
                binaryStr += String.fromCharCode(binary[i]);
            }
            return btoa(binaryStr);
        }

        function base64ToDll(base64Str) {
            const clean = base64Str.replace(/\s/g, '');
            const binaryStr = atob(clean);
            const len = binaryStr.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binaryStr.charCodeAt(i);
            }
            return bytes;
        }

        // file operations using File API (browser)
        function readFileAsArrayBuffer(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.onerror = (e) => reject(e.target.error);
                reader.readAsArrayBuffer(file);
            });
        }

        function readFileAsText(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.onerror = (e) => reject(e.target.error);
                reader.readAsText(file);
            });
        }

        function downloadFile(content, filename, mimeType = 'text/plain') {
            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // ----- core conversion -----
        async function performConversion() {
            const inputVal = inputPath.value.trim();
            if (!inputVal) {
                messageBox('Error', 'Please select an input file.');
                return;
            }
            // output path optional – if empty we use auto
            let outPath = outputPath.value.trim();
            if (!outPath) {
                // auto generate
                const auto = generateAutoName(inputVal);
                if (auto) {
                    outputPath.value = auto;
                    outPath = auto;
                } else {
                    messageBox('Error', 'Please specify or auto‑generate an output file.');
                    return;
                }
            }

            // we need to read the file via input[type=file] 
            // but we store the file object in a data attribute from browse
            const fileObj = window._selectedFile;
            if (!fileObj) {
                messageBox('Error', 'No file selected. Use Browse to pick a file.');
                return;
            }

            // disable UI
            convertBtn.disabled = true;
            setProgress(10);
            setStatus('Converting ...');

            try {
                const mode = currentMode;
                let resultData = null;
                let outputFilename = outPath;
                let mime = 'text/plain';

                if (mode === 'dll_to_base64') {
                    // read as arraybuffer
                    const arrayBuf = await readFileAsArrayBuffer(fileObj);
                    const base64Str = dllToBase64(arrayBuf);
                    resultData = base64Str;
                    // preview
                    const preview = base64Str.length > 500 ? base64Str.slice(0, 500) + '…' : base64Str;
                    const sizeMsg = `Size: ${base64Str.length} characters`;
                    resultArea.value = `✅ Conversion successful!\nInput: ${fileObj.name}\nOutput: ${outPath}\n${sizeMsg}\n\nPreview:\n${preview}`;
                    // output file content
                    outputFilename = outPath.endsWith('.txt') ? outPath : outPath + '.txt';
                    mime = 'text/plain';
                    // store last result for copy
                    lastResult = base64Str;
                } else { // base64_to_dll
                    const text = await readFileAsText(fileObj);
                    const clean = text.replace(/\s/g, '');
                    try {
                        const bytes = base64ToDll(clean);
                        resultData = bytes;
                        // preview as hex
                        const hexPreview = bytes.slice(0, 100).reduce((acc, b) => acc + b.toString(16).padStart(2,'0'), '');
                        const hexShow = bytes.length > 100 ? hexPreview + '…' : hexPreview;
                        const sizeMsg = `Size: ${bytes.length} bytes`;
                        resultArea.value = `✅ Conversion successful!\nInput: ${fileObj.name}\nOutput: ${outPath}\n${sizeMsg}\n\nPreview (hex):\n${hexShow}`;
                        // store raw bytes for download
                        lastResult = bytes;
                        outputFilename = outPath.endsWith('.dll') ? outPath : outPath + '.dll';
                        mime = 'application/octet-stream';
                    } catch (e) {
                        throw new Error('Invalid Base64 input: ' + e.message);
                    }
                }

                // save output file (trigger download)
                if (mode === 'dll_to_base64') {
                    downloadFile(resultData, outputFilename, mime);
                } else {
                    // binary data (Uint8Array)
                    const blob = new Blob([resultData], { type: mime });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = outputFilename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }

                setProgress(100);
                setStatus('✅ Done');
                lastOutputPath = outputFilename;
                fileSizeStat.textContent = '✅ saved';

            } catch (err) {
                setStatus('❌ Conversion failed', true);
                resultArea.value = `❌ Conversion failed:\n${err.message}`;
                console.error(err);
                messageBox('Error', 'Conversion failed. See preview for details.');
            } finally {
                convertBtn.disabled = false;
                setTimeout(() => setProgress(0), 800);
            }
        }

        // ----- UI helpers -----
        function generateAutoName(inputPathVal) {
            if (!inputPathVal) return '';
            const base = inputPathVal.replace(/^.*[\\/]/, '').replace(/\.[^.]+$/, '');
            if (currentMode === 'dll_to_base64') {
                return base + '_encoded.txt';
            } else {
                return base + '_decoded.dll';
            }
        }

        function updateAutoName() {
            const inp = inputPath.value.trim();
            if (inp) {
                const auto = generateAutoName(inp);
                if (auto && !outputPath.value.trim()) {
                    outputPath.value = auto;
                }
            }
        }

        function messageBox(title, msg) {
            alert(title + '\n\n' + msg);
        }

        // ----- browse handlers (using file input) -----
        function browseInput() {
            const input = document.createElement('input');
            input.type = 'file';
            if (currentMode === 'dll_to_base64') {
                input.accept = '.dll, application/x-msdownload';
            } else {
                input.accept = '.txt, text/plain';
            }
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                window._selectedFile = file;
                inputPath.value = file.name;
                // auto output
                const auto = generateAutoName(file.name);
                if (auto) {
                    outputPath.value = auto;
                }
                fileSizeStat.textContent = (file.size/1024).toFixed(1) + ' KB';
                setStatus('File selected');
            };
            input.click();
        }

        function browseOutput() {
            // for simplicity we just ask user to type or auto-name,
            // but we can also do a fake save dialog: prompt
            const userVal = prompt('Enter output filename (or leave blank to auto-generate):', outputPath.value || '');
            if (userVal !== null) {
                outputPath.value = userVal.trim();
            }
        }

        // ----- mode switching -----
        function setMode(mode) {
            currentMode = mode;
            modeOptions.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === mode);
            });
            // clear file selection (since file type may mismatch)
            inputPath.value = '';
            outputPath.value = '';
            window._selectedFile = null;
            resultArea.value = '';
            lastResult = '';
            setStatus('Mode changed');
            fileSizeStat.textContent = '';
            // update placeholder
            if (mode === 'dll_to_base64') {
                inputPath.placeholder = 'Select .dll file';
            } else {
                inputPath.placeholder = 'Select .txt base64 file';
            }
        }

        // ----- copy, clear, save output -----
        function copyResult() {
            const text = resultArea.value;
            if (!text) {
                messageBox('Info', 'Nothing to copy.');
                return;
            }
            // if conversion result contains the actual data, copy just the data part? 
            // but we copy the whole preview – better to copy only the encoded/decoded ?
            // we'll copy the lastResult (raw) if available, else fallback
            if (lastResult) {
                let copyContent = '';
                if (typeof lastResult === 'string') {
                    copyContent = lastResult;
                } else if (lastResult instanceof Uint8Array) {
                    // hex representation or base64? we copy as base64? 
                    // better to copy as text? we'll copy the preview text from area
                    copyContent = resultArea.value;
                } else {
                    copyContent = resultArea.value;
                }
                navigator.clipboard.writeText(copyContent).then(() => {
                    setStatus('Copied to clipboard');
                }).catch(() => {
                    // fallback
                    resultArea.select();
                    document.execCommand('copy');
                    setStatus('Copied (fallback)');
                });
            } else {
                navigator.clipboard.writeText(resultArea.value).then(() => {
                    setStatus('Copied to clipboard');
                }).catch(() => {
                    resultArea.select();
                    document.execCommand('copy');
                    setStatus('Copied (fallback)');
                });
            }
        }

        function clearResult() {
            resultArea.value = '';
            lastResult = '';
            setStatus('Cleared');
        }

        function saveOutputAction() {
            const out = outputPath.value.trim();
            if (!out) {
                messageBox('Info', 'No output file specified. Please set output path.');
                return;
            }
            if (!lastResult) {
                messageBox('Info', 'No conversion result to save. Run conversion first.');
                return;
            }
            // re-download the last result
            let content = lastResult;
            let filename = out;
            let mime = 'text/plain';
            if (currentMode === 'dll_to_base64') {
                if (typeof content === 'string') {
                    downloadFile(content, filename, 'text/plain');
                }
            } else {
                if (content instanceof Uint8Array) {
                    const blob = new Blob([content], { type: 'application/octet-stream' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }
            }
            setStatus('File saved');
        }

        // ----- event binding -----
        modeOptions.forEach(btn => {
            btn.addEventListener('click', () => {
                setMode(btn.dataset.mode);
            });
        });

        browseInputBtn.addEventListener('click', browseInput);
        browseOutputBtn.addEventListener('click', browseOutput);
        autoNameBtn.addEventListener('click', () => {
            const inp = inputPath.value.trim();
            if (!inp) {
                messageBox('Info', 'Select an input file first.');
                return;
            }
            const auto = generateAutoName(inp);
            if (auto) outputPath.value = auto;
        });

        convertBtn.addEventListener('click', performConversion);

        copyBtn.addEventListener('click', copyResult);
        clearBtn.addEventListener('click', clearResult);
        saveOutputBtn.addEventListener('click', saveOutputAction);

        // init
        setMode('dll_to_base64');
        setStatus('Ready · select a DLL or Base64 file');

        // enable drag & drop? not necessary – but we keep simple.

        // fix for output browse: we use prompt for simplicity
        // also update auto name on input change (if user types)
        inputPath.addEventListener('change', () => {
            if (inputPath.value.trim() && !outputPath.value.trim()) {
                updateAutoName();
            }
        });

        // style tweak: show file size on input change
        // we use file object from browse
        console.log('BIOS USER TOOL loaded · HYPERSENSEINDIA · AG HYDRAX FF');
    })();
</script>
</body>
</html>
